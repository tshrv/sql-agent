services:
  sa_postgres:
    image: postgres:13
    container_name: sa_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - sa_postgres_data:/var/lib/postgresql/data
      - ./sa_postgres/data:/tmp/sa_postgres_data
      - ./sa_postgres/init:/docker-entrypoint-initdb.d
  
  sa_pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: sa_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - sa_pgadmin_data:/var/lib/pgadmin

volumes:
  sa_postgres_data:
  sa_pgadmin_data: